<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeReach — Emergency Response</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* -- Core geometry (responsive, viewport-based) -- */
      --circle-diameter: 16vmin;
      --circle-radius: 8vmin;
      --gap: 2vmin;
      --trap-length: 14vmin;
      --trap-outer-span: 24vmin;
      --container-size: 62vmin;
      --ring-thickness: 3vmin;

      /* -- Dark, serious background with danger undertone -- */
      --bg-start: #1a1a1f;
      --bg-end: #0d0d12;

      /* -- SOS button -- */
      --sos-red: #e63946;
      --sos-red-hover: #d62839;
      --sos-red-active: #c1121f;
      --sos-glow: rgba(230, 57, 70, 0.6);

      /* -- All four trapezoids: same solid dark colour -- */
      --trap-bg: #1e1e26;
      --trap-hover: #25252f;
      --trap-border: rgba(255, 255, 255, 0.15);
      --trap-border-hover: rgba(230, 57, 70, 0.55);
      --trap-text: #c0c0cc;

      /* -- Neutral tones -- */
      --border-soft: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text-dark: #e0e0e0;
      --text-mid: #999aaa;
      --text-white: #ffffff;
      --white: #1c1c22;
      --card-bg: #1c1c22;

      /* -- Typography -- */
      --font-head: 'Nunito', sans-serif;
      --font-body: 'Quicksand', sans-serif;

      /* -- Shadows -- */
      --shadow-soft: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lift: 0 8px 28px rgba(0, 0, 0, 0.6);
      --shadow-sos: 0 6px 30px rgba(230, 57, 70, 0.6);
      --shadow-sos-hover: 0 12px 44px rgba(230, 57, 70, 0.85);
      --shadow-danger: 0 0 40px rgba(230, 57, 70, 0.25);

      /* -- Bottom buttons -- */
      --bottom-btn-height: 8vmin;
      --bottom-btn-width: 14vmin;
      --home-btn-width: 20vmin;
      --account-btn-size: 8vmin;

      /* -- Larger label size -- */
      --label-font-size: clamp(13px, 2.2vmin, 20px);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow: hidden;
      position: relative;
      gap: 2vmin;
    }

    /* -- Dark floating blobs with danger accent -- */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 45vmin;
      height: 45vmin;
      background: radial-gradient(circle, rgba(230, 57, 70, 0.12) 0%, transparent 70%);
      top: -12vmin;
      left: -12vmin;
      animation: floatBlob 8s ease-in-out infinite;
    }
    body::after {
      width: 55vmin;
      height: 55vmin;
      background: radial-gradient(circle, rgba(230, 57, 70, 0.08) 0%, transparent 70%);
      bottom: -18vmin;
      right: -18vmin;
      animation: floatBlob 10s ease-in-out infinite reverse;
    }

    /* -- Subtle danger vignette overlay -- */
    .danger-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(230, 57, 70, 0.06) 85%, rgba(180, 30, 40, 0.12) 100%);
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(4vmin, 4vmin) scale(1.06);
      }
    }

    /* -- Page title (top center) -- */
    .page-title {
      position: fixed;
      top: 2.5vmin;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-head);
      font-size: clamp(13px, 2.2vmin, 19px);
      font-weight: 800;
      color: var(--text-white);
      letter-spacing: 0.08em;
      z-index: 50;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.5em;
      animation: fadeIn 0.5s ease 0.1s both;
      text-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
    }
    .page-title .dot {
      width: 9px;
      height: 9px;
      background: var(--sos-red);
      border-radius: 50%;
      animation: pulse-dot 1.8s ease-in-out infinite;
      box-shadow: 0 0 12px var(--sos-glow);
    }
    @keyframes pulse-dot {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
        box-shadow: 0 0 8px var(--sos-glow);
      }
      50% {
        transform: scale(1.8);
        opacity: 0.5;
        box-shadow: 0 0 20px var(--sos-glow);
      }
    }

    /* -- Account button (top right) -- */
    .account-button {
      position: fixed;
      top: 3vmin;
      right: 4vmin;
      width: var(--account-btn-size);
      height: var(--account-btn-size);
      border-radius: 50%;
      background: var(--card-bg);
      border: 2px solid var(--border-strong);
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: clamp(12px, 2vmin, 18px);
      font-weight: 800;
      color: var(--text-white);
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, border-color 0.2s ease;
      animation: fadeIn 0.5s ease 0.3s both;
      overflow: hidden;
    }
    .account-button:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-lift);
      border-color: var(--sos-red);
    }
    .account-button:active {
      transform: scale(0.93);
    }

    /* -- Emergency panel (central layout container) -- */
    .emergency-panel {
      position: relative;
      width: var(--container-size);
      height: var(--container-size);
      flex-shrink: 0;
      z-index: 1;
      animation: panelIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* -- Concentric ring behind SOS -- */
    .sos-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(var(--circle-diameter) + var(--ring-thickness) * 2);
      height: calc(var(--circle-diameter) + var(--ring-thickness) * 2);
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid rgba(230, 57, 70, 0.2);
      z-index: 9;
      pointer-events: none;
      animation: ringPulse 2.5s ease-in-out infinite;
      box-shadow: var(--shadow-danger);
    }
    @keyframes ringPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.35);
        border-color: rgba(230, 57, 70, 0.2);
      }
      50% {
        box-shadow: 0 0 0 14px rgba(230, 57, 70, 0);
        border-color: rgba(230, 57, 70, 0.5);
      }
    }

    /* -- Central SOS button -- */
    .sos-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--circle-diameter);
      height: var(--circle-diameter);
      border-radius: 50%;
      background: var(--sos-red);
      color: var(--text-white);
      border: 3px solid rgba(255, 255, 255, 0.25);
      font-family: var(--font-head);
      font-size: clamp(22px, 4.5vmin, 40px);
      font-weight: 900;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 10;
      box-shadow: var(--shadow-sos);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background 0.15s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .sos-button:hover {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: var(--shadow-sos-hover);
      background: var(--sos-red-hover);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .sos-button:active {
      transform: translate(-50%, -50%) scale(0.93);
      box-shadow: 0 3px 14px rgba(230, 57, 70, 0.5);
      transition-duration: 0.07s;
      background: var(--sos-red-active);
      border-color: rgba(255, 255, 255, 0.35);
    }
    .sos-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      pointer-events: none;
    }
    .sos-sub {
      display: block;
      font-size: clamp(6px, 1.1vmin, 10px);
      font-weight: 700;
      letter-spacing: 0.14em;
      opacity: 0.8;
      margin-top: 2px;
      color: rgba(255, 255, 255, 0.85);
    }

    /* -- Trapezoid buttons (four corners, curved inner edges, heavily rounded) -- */
    .trapezoid {
      position: absolute;
      border: 1px solid var(--trap-border);
      cursor: pointer;
      z-index: 5;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      filter: drop-shadow(0 3px 10px rgba(0, 0, 0, 0.5));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--trap-bg);
    }
    .trapezoid:hover {
      filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.7));
      z-index: 8;
      background: var(--trap-hover);
      border-color: var(--trap-border-hover);
    }
    .trapezoid:active {
      transition-duration: 0.07s;
    }

    /* -- Top-Left: Police -- */
    .trapezoid-top-left {
      top: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      left: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      width: var(--trap-outer-span);
      height: var(--trap-outer-span);
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
          calc(100% - var(--circle-radius)) 100%,
          100% calc(100% - var(--circle-radius)));
      border-radius: 24px 0 0 0;
    }
    .trapezoid-top-left:hover {
      transform: scale(1.05) translate(-2px, -2px);
    }
    .trapezoid-top-left:active {
      transform: scale(0.95);
    }

    /* -- Top-Right: Ambulance -- */
    .trapezoid-top-right {
      top: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      right: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      width: var(--trap-outer-span);
      height: var(--trap-outer-span);
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
          var(--circle-radius) 100%,
          0% calc(100% - var(--circle-radius)));
      border-radius: 0 24px 0 0;
    }
    .trapezoid-top-right:hover {
      transform: scale(1.05) translate(2px, -2px);
    }
    .trapezoid-top-right:active {
      transform: scale(0.95);
    }

    /* -- Bottom-Right: Fire -- */
    .trapezoid-bottom-right {
      bottom: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      right: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      width: var(--trap-outer-span);
      height: var(--trap-outer-span);
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
          var(--circle-radius) 0%,
          0% var(--circle-radius));
      border-radius: 0 0 24px 0;
    }
    .trapezoid-bottom-right:hover {
      transform: scale(1.05) translate(2px, 2px);
    }
    .trapezoid-bottom-right:active {
      transform: scale(0.95);
    }

    /* -- Bottom-Left: Family -- */
    .trapezoid-bottom-left {
      bottom: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      left: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length));
      width: var(--trap-outer-span);
      height: var(--trap-outer-span);
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
          calc(100% - var(--circle-radius)) 0%,
          100% var(--circle-radius));
      border-radius: 0 0 0 24px;
    }
    .trapezoid-bottom-left:hover {
      transform: scale(1.05) translate(-2px, 2px);
    }
    .trapezoid-bottom-left:active {
      transform: scale(0.95);
    }

    /* -- Service labels (bigger text, unified colour) -- */
    .service-label {
      position: absolute;
      font-family: var(--font-head);
      font-size: var(--label-font-size);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
      z-index: 16;
      text-align: center;
      line-height: 1.3;
      color: var(--trap-text);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }
    .label-top-left {
      top: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      left: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      transform: translate(-50%, -50%);
    }
    .label-top-right {
      top: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      right: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      transform: translate(50%, -50%);
    }
    .label-bottom-right {
      bottom: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      right: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      transform: translate(50%, 50%);
    }
    .label-bottom-left {
      bottom: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      left: calc(50% - var(--circle-radius) - var(--gap) - var(--trap-length) + var(--trap-outer-span) / 2);
      transform: translate(-50%, 50%);
    }

    /* -- Bottom section (home + action buttons) -- */
    .bottom-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 20;
      flex-shrink: 0;
      animation: panelIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
    }

    /* -- Home button -- */
    .home-button {
      width: var(--home-btn-width);
      height: var(--bottom-btn-height);
      background: var(--card-bg);
      border: 2px solid var(--border-strong);
      cursor: pointer;
      font-family: var(--font-head);
      font-size: clamp(9px, 1.5vmin, 13px);
      font-weight: 800;
      color: var(--text-white);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      padding: 0 1vmin;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px 12px 0 0;
      margin-bottom: -2px;
      overflow: hidden;
    }
    .home-button:hover {
      transform: scale(1.04);
      box-shadow: var(--shadow-lift);
      z-index: 2;
      background: #22222a;
      border-color: var(--sos-red);
    }
    .home-button:active {
      transform: scale(0.96);
      transition-duration: 0.07s;
    }

    /* -- Bottom rectangular buttons row -- */
    .bottom-buttons-row {
      display: flex;
      flex-direction: row;
      gap: 0;
    }
    .bottom-rect-btn {
      width: var(--bottom-btn-width);
      height: var(--bottom-btn-height);
      background: var(--card-bg);
      border: 2px solid var(--border-strong);
      cursor: pointer;
      font-family: var(--font-head);
      font-size: clamp(8px, 1.3vmin, 12px);
      font-weight: 800;
      color: var(--text-white);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background 0.15s, border-color 0.2s ease;
      padding: 0 0.8vmin;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -2px;
      overflow: hidden;
    }
    .bottom-rect-btn:first-child {
      margin-left: 0;
      border-radius: 0 0 0 12px;
    }
    .bottom-rect-btn:last-child {
      border-radius: 0 0 12px 0;
    }
    .bottom-rect-btn:hover {
      transform: scale(1.06);
      box-shadow: var(--shadow-lift);
      z-index: 2;
      border-color: var(--sos-red);
      background: #22222a;
    }
    .bottom-rect-btn:active {
      transform: scale(0.94);
      transition-duration: 0.07s;
    }

    /* -- Ripple effect on click -- */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(230, 57, 70, 0.25);
      transform: scale(0);
      animation: rippleAnim 0.55s linear forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* -- Toast notification -- */
    .toast {
      position: fixed;
      bottom: 4vmin;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2a2a35;
      color: var(--text-white);
      font-family: var(--font-head);
      font-size: clamp(11px, 1.8vmin, 15px);
      font-weight: 700;
      padding: 1.2vmin 3vmin;
      border-radius: 100px;
      border: 1px solid rgba(230, 57, 70, 0.4);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* -- Entry animations -- */
    @keyframes panelIn {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* -- Responsive adjustments -- */
    @media (max-width: 400px) {
      :root {
        --gap: 1.6vmin;
        --trap-length: 13vmin;
        --trap-outer-span: 26vmin;
        --circle-diameter: 17vmin;
        --circle-radius: 8.5vmin;
        --container-size: 66vmin;
        --ring-thickness: 2.5vmin;
        --account-btn-size: 9vmin;
        --bottom-btn-height: 9vmin;
        --bottom-btn-width: 16vmin;
        --home-btn-width: 20vmin;
        --label-font-size: clamp(11px, 1.8vmin, 16px);
      }
    }
    @media (min-width: 1200px) {
      :root {
        --gap: 2.5vmin;
        --trap-length: 15vmin;
        --trap-outer-span: 26vmin;
        --circle-diameter: 18vmin;
        --circle-radius: 9vmin;
        --container-size: 66vmin;
        --ring-thickness: 3.2vmin;
        --account-btn-size: 5.5vmin;
        --bottom-btn-height: 7.5vmin;
        --bottom-btn-width: 15vmin;
        --home-btn-width: 22vmin;
        --label-font-size: clamp(14px, 2.4vmin, 22px);
      }
    }
  </style>
</head>
<body>

  <!-- Subtle danger vignette overlay -->
  <div class="danger-overlay" aria-hidden="true"></div>

  <!-- Page title -->
  <div class="page-title">
    <span class="dot"></span>
    SafeReach
  </div>

  <!-- Account button -->
  <button class="account-button" data-service="account" aria-label="View Account" title="Account">
    AB
  </button>

  <!-- Main emergency panel -->
  <div class="emergency-panel" role="region" aria-label="Emergency response controls">

    <!-- White concentric ring -->
    <div class="sos-ring" aria-hidden="true"></div>

    <!-- Police (top-left) -->
    <button class="trapezoid trapezoid-top-left" data-service="police" aria-label="Call Police" title="Police"></button>
    <span class="service-label label-top-left">Police</span>

    <!-- Ambulance (top-right) -->
    <button class="trapezoid trapezoid-top-right" data-service="ambulance" aria-label="Call Ambulance" title="Ambulance"></button>
    <span class="service-label label-top-right">Ambulance</span>

    <!-- Fire (bottom-right) -->
    <button class="trapezoid trapezoid-bottom-right" data-service="fire" aria-label="Call Fire Service" title="Fire Service"></button>
    <span class="service-label label-bottom-right">Fire</span>

    <!-- Family (bottom-left) -->
    <button class="trapezoid trapezoid-bottom-left" data-service="family" aria-label="Send Family Alert" title="Family Alert"></button>
    <span class="service-label label-bottom-left">Family</span>

    <!-- Central SOS button -->
    <button class="sos-button" data-service="sos" aria-label="SOS Emergency" title="SOS Emergency">
      <span class="sos-inner">
        SOS
        <span class="sos-sub">HELP ME</span>
      </span>
    </button>

  </div>

  <!-- Bottom section -->
  <div class="bottom-section" role="group" aria-label="Navigation and additional options">
    <button class="home-button" data-service="home" aria-label="Go to Home" title="Home">
      Home
    </button>
    <div class="bottom-buttons-row">
      <button class="bottom-rect-btn" data-service="contacts" aria-label="Contacts" title="Contacts">
        Contacts
      </button>
      <button class="bottom-rect-btn" data-service="location" aria-label="Location" title="Location">
        Location
      </button>
      <button class="bottom-rect-btn" data-service="firstaid" aria-label="First Aid" title="First Aid">
        First Aid
      </button>
      <button class="bottom-rect-btn" data-service="settings" aria-label="Settings" title="Settings">
        Settings
      </button>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // -- Toast notification logic --
      var toast = document.getElementById('toast');
      var toastTimer = null;

      function showToast(message) {
        if (!toast) return;
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add('show');
        toastTimer = setTimeout(function() {
          toast.classList.remove('show');
        }, 2200);
      }

      // -- Messages map for each service --
      var messages = {
        sos: 'SOS sent! Help is on the way.',
        police: 'Connecting to Police...',
        ambulance: 'Calling Ambulance...',
        fire: 'Alerting Fire Service...',
        family: 'Family Alert sent!',
        home: 'Going Home...',
        contacts: 'Opening Contacts',
        location: 'Sharing Location...',
        firstaid: 'Opening First Aid Guide',
        settings: 'Opening Settings',
        account: 'Your Account'
      };

      // -- Ripple effect on click --
      function addRipple(element, event) {
        if (!element || !event) return;

        var computedPosition = window.getComputedStyle(element).position;
        if (computedPosition === 'static') {
          element.style.position = 'relative';
        }
        if (window.getComputedStyle(element).overflow === 'visible') {
          element.style.overflow = 'hidden';
        }

        var rect = element.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.className = 'ripple';

        var size = Math.max(rect.width, rect.height);
        var clientX = event.clientX || (event.touches && event.touches[0] && event.touches[0].clientX) || rect.left + rect.width / 2;
        var clientY = event.clientY || (event.touches && event.touches[0] && event.touches[0].clientY) || rect.top + rect.height / 2;
        var x = clientX - rect.left - size / 2;
        var y = clientY - rect.top - size / 2;

        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        element.appendChild(ripple);

        setTimeout(function() {
          if (ripple && ripple.parentNode) {
            ripple.parentNode.removeChild(ripple);
          }
        }, 600);
      }

      // -- Select all interactive buttons --
      var buttons = document.querySelectorAll('.sos-button, .trapezoid, .account-button, .home-button, .bottom-rect-btn');

      buttons.forEach(function(btn) {
        var serviceName = btn.getAttribute('data-service');

        btn.addEventListener('pointerdown', function(e) {
          e.preventDefault();
        });

        btn.addEventListener('click', function(e) {
          e.preventDefault();
          addRipple(btn, e);
          if (messages[serviceName]) {
            showToast(messages[serviceName]);
          }
          console.log('[SafeReach] ' + (btn.getAttribute('aria-label') || serviceName) + ' activated');
        });

        btn.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            btn.click();
          }
        });
      });

      console.log('[SafeReach] Ready. Stay safe.');
    })();
  </script>
</body>
</html>
